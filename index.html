<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stampa Cartella Clinica – Cosmedic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <script src="config.js"></script>
  <style>
    /* RESET & BASE */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      /* Dark Theme Palettes */
      --bg-base: #0B0E14;
      --bg-gradient-1: #1a1528;
      --bg-gradient-2: #101c2a;

      /* Glassmorphism Surface */
      --glass-bg: rgba(22, 26, 36, 0.45);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-highlight: rgba(255, 255, 255, 0.03);
      --glass-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);

      /* Accents */
      --accent-primary: #3b82f6;
      /* Blue */
      --accent-secondary: #8b5cf6;
      /* Purple */
      --accent-tertiary: #ec4899;
      /* Pink */

      /* Status */
      --success: #10b981;
      --error: #ef4444;

      /* Text */
      --text-main: #f8fafc;
      --text-muted: #94a3b8;

      /* Typography */
      --font-display: 'Outfit', sans-serif;
      --font-body: 'Plus Jakarta Sans', sans-serif;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--bg-base);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* MESH GRADIENT BACKGROUND ANIMATION */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: -1;
      overflow: hidden;
      background: var(--bg-base);
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.6;
      animation: float 20s infinite ease-in-out alternate;
    }

    .orb-1 {
      width: 40vw;
      height: 40vw;
      background: var(--accent-primary);
      top: -10%;
      left: -10%;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 50vw;
      height: 50vw;
      background: var(--accent-secondary);
      bottom: -20%;
      right: -10%;
      animation-duration: 25s;
      animation-delay: -5s;
    }

    .orb-3 {
      width: 30vw;
      height: 30vw;
      background: rgba(45, 212, 191, 0.4);
      /* Teal */
      top: 40%;
      left: 60%;
      animation-duration: 30s;
    }

    @keyframes float {
      0% {
        transform: translate(0, 0) scale(1);
      }

      50% {
        transform: translate(5%, 10%) scale(1.1);
      }

      100% {
        transform: translate(-5%, -5%) scale(0.95);
      }
    }

    /* LAYOUT & ENTRANCE ANIMATIONS */
    .container {
      width: 100%;
      max-width: 540px;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 10;
      opacity: 0;
      animation: fadeUp 1s 0.2s forwards cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeUp {
      0% {
        opacity: 0;
        transform: translateY(30px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* HEADER */
    header {
      text-align: center;
      margin-bottom: 40px;
      width: 100%;
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(139, 92, 246, 0.2));
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 22px;
      font-size: 36px;
      margin-bottom: 24px;
      box-shadow: 0 0 40px rgba(139, 92, 246, 0.15), inset 0 0 20px rgba(255, 255, 255, 0.05);
      position: relative;
    }

    .logo-badge::after {
      content: '';
      position: absolute;
      top: -1px;
      left: -1px;
      right: -1px;
      bottom: -1px;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0) 50%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      padding: 1px;
    }

    h1 {
      font-family: var(--font-display);
      font-size: 2.7rem;
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 1.1;
      margin-bottom: 12px;
    }

    h1 .gradient-text {
      background: linear-gradient(to right, #60a5fa, #c084fc, #f472b6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: inline-block;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 1.05rem;
      font-weight: 400;
      letter-spacing: 0.2px;
    }

    /* GLASSMORPHISM CARD */
    .glass-card {
      width: 100%;
      background: var(--glass-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-top: 1px solid rgba(255, 255, 255, 0.15);
      /* Highlighted top edge */
      border-radius: 28px;
      padding: 40px;
      box-shadow: var(--glass-shadow);
      position: relative;
      overflow: hidden;
    }

    /* Inner subtle glow */
    .glass-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(180deg, var(--glass-highlight) 0%, rgba(255, 255, 255, 0) 100%);
      pointer-events: none;
    }

    /* FORM ELEMENTS */
    .form-group {
      text-align: left;
      margin-bottom: 32px;
      position: relative;
      z-index: 2;
    }

    .form-label {
      display: block;
      font-family: var(--font-display);
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* CUSTOM SELECT */
    .select-wrapper {
      position: relative;
    }

    .select-wrapper::after {
      content: '▾';
      font-size: 1.2rem;
      color: var(--text-muted);
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      transition: transform 0.3s;
    }

    .select-wrapper:hover::after {
      color: var(--text-main);
      transform: translateY(-50%) scale(1.2);
    }

    select {
      width: 100%;
      padding: 18px 20px;
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-main);
      font-family: var(--font-body);
      font-size: 1.05rem;
      appearance: none;
      cursor: pointer;
      outline: none;
      transition: all 0.3s ease;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
    }

    select:hover,
    select:focus {
      border-color: rgba(139, 92, 246, 0.5);
      background: rgba(0, 0, 0, 0.4);
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2), 0 0 0 4px rgba(139, 92, 246, 0.1);
    }

    /* PREMIUM BUTTON */
    .btn-super {
      position: relative;
      width: 100%;
      padding: 20px;
      border: none;
      border-radius: 16px;
      font-family: var(--font-display);
      font-size: 1.15rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.3);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-style: preserve-3d;
      overflow: hidden;
      z-index: 2;
    }

    /* Hover Sweep Effect */
    .btn-super::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.7s ease;
      z-index: -1;
    }

    .btn-super:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 15px 40px rgba(139, 92, 246, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.4);
    }

    .btn-super:hover::after {
      left: 100%;
    }

    .btn-super:active {
      transform: translateY(2px) scale(0.98);
      box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3);
    }

    .btn-super:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.4);
    }

    .btn-icon {
      margin-right: 10px;
      font-size: 1.3rem;
      vertical-align: middle;
    }

    /* PROGRESS BAR */
    .progress-container {
      margin-top: 30px;
      opacity: 0;
      height: 0;
      transition: all 0.4s ease;
      overflow: hidden;
      z-index: 2;
      position: relative;
    }

    .progress-container.visible {
      opacity: 1;
      height: auto;
      margin-top: 30px;
    }

    .progress-track {
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.4);
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #3b82f6, #ec4899);
      border-radius: 999px;
      transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 0 10px rgba(236, 72, 153, 0.5);
      position: relative;
    }

    /* Animated shine on progress */
    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      animation: progress-shine 2s infinite linear;
    }

    @keyframes progress-shine {
      0% {
        transform: translateX(-100%);
      }

      100% {
        transform: translateX(100%);
      }
    }

    /* STATUS TEXT */
    #status {
      font-size: 0.95rem;
      color: var(--text-muted);
      text-align: center;
      margin-top: 16px;
      min-height: 24px;
      font-weight: 500;
      transition: color 0.3s;
    }

    .status-error {
      color: var(--error) !important;
    }

    .status-success {
      color: var(--success) !important;
    }

    /* FOOTER */
    footer {
      margin-top: 60px;
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.85rem;
      z-index: 10;
      letter-spacing: 0.5px;
    }

    /* CHECKBOX GRID FOR BASE DOCS */
    .checkbox-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      margin-top: 10px;
    }

    /* CUSTOM CHECKBOX */
    .checkbox-wrapper {
      display: flex;
      align-items: flex-start;
      cursor: pointer;
      padding: 12px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.2s ease;
    }

    .checkbox-wrapper:hover {
      background: rgba(0, 0, 0, 0.35);
      border-color: rgba(139, 92, 246, 0.3);
    }

    .checkbox-wrapper input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      min-width: 20px;
      width: 20px;
      height: 20px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      margin-right: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .checkbox-wrapper input[type="checkbox"]::after {
      content: '✓';
      font-family: inherit;
      color: white;
      font-size: 14px;
      opacity: 0;
      transform: scale(0.5);
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .checkbox-wrapper input[type="checkbox"]:checked {
      background: var(--accent-primary);
      border-color: var(--accent-primary);
      box-shadow: 0 0 10px rgba(59, 130, 246, 0.4);
    }

    .checkbox-wrapper input[type="checkbox"]:checked::after {
      opacity: 1;
      transform: scale(1);
    }

    .checkbox-label-text {
      font-size: 0.85rem;
      color: var(--text-main);
      line-height: 1.3;
      user-select: none;
    }
  </style>
</head>

<body>

  <!-- Animated Background -->
  <div class="bg-animation">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="container">
    <header>
      <div class="logo-badge">⚕️</div>
      <h1>Stampa <span class="gradient-text">Clinica</span></h1>
      <p class="subtitle">Cosmedic SRL – Generazione Automatica Referti</p>
    </header>

    <div class="glass-card">
      <!-- Selettore Singolo Documento -->
      <div class="form-group" id="single-file-group">
        <label class="form-label" for="single-file-select" style="color: var(--accent-tertiary);">Stampa Singolo File (Opzionale)</label>
        <div class="select-wrapper">
          <select id="single-file-select">
            <option value="">Nessun file singolo (Stampa l'intero pacchetto clinica)</option>
            <!-- Injected Options -->
          </select>
        </div>
      </div>

      <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 30px 0;">

      <div id="package-selectors">
        <!-- Documenti Base -->
        <div class="form-group" id="base-docs-group">
          <label class="form-label">Documenti Base</label>
          <div id="checkboxes-container" class="checkbox-grid">
            <!-- Injected Checkboxes -->
          </div>
        </div>

        <!-- Sede dell'intervento -->
        <div class="form-group" id="clinic-group">
          <label class="form-label" for="clinic-select">Sede Intervento</label>
          <div class="select-wrapper">
            <select id="clinic-select">
              <option value="cosmedic">Studio COSMEDIC (Standard)</option>
              <option value="external">Altre Cliniche (Rimuove Anestesia, Aggiunge IBAN)</option>
            </select>
          </div>
        </div>

      <!-- Intervento Specifico -->
      <div class="form-group" id="intervention-group" style="display:none;">
        <label class="form-label" for="intervention-select">Intervento Specifico</label>
        <div class="select-wrapper">
          <select id="intervention-select">
            <option value="">Nessun intervento (solo documenti base)</option>
            <!-- Injected Options -->
          </select>
        </div>
      </div>

      <button class="btn-super" id="print-btn">
        <span class="btn-icon">🖨️</span> Genera e Stampa Documenti
      </button>

      <div class="progress-container" id="progress-container">
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <p id="status"></p>
      </div>
    </div>

    <footer>&copy; 2026 Cosmedic SRL</footer>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const printBtn = document.getElementById('print-btn');
      const statusEl = document.getElementById('status');
      const progressContainer = document.getElementById('progress-container');
      const progressFill = document.getElementById('progress-fill');
      
      const singleFileSelect = document.getElementById('single-file-select');
      
      const packageSelectors = document.getElementById('package-selectors');
      
      const checkboxesContainer = document.getElementById('checkboxes-container');
      const clinicSelect = document.getElementById('clinic-select');
      const interventionGroup = document.getElementById('intervention-group');
      const interventionSelect = document.getElementById('intervention-select');

      // Populate Intervention Dropdown & Single File Dropdown & Base Docs Checkboxes
      if (window.APP_CONFIG) {
        // Collect all possible files for the single-file dropdown
        const allFilesSet = new Set();
        
        if (window.APP_CONFIG.PDF_FILES) {
          window.APP_CONFIG.PDF_FILES.forEach(f => {
            allFilesSet.add(f)
            
            // Creazione checkbox per documenti base
            const label = document.createElement('label');
            label.className = 'checkbox-wrapper';
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.value = f;
            checkbox.className = 'base-doc-checkbox';
            // unchecked by default as per user request
            
            const span = document.createElement('span');
            span.className = 'checkbox-label-text';
            // Rimuovi l'estensione per pulizia estetica
            span.textContent = f.replace('.pdf', '');
            
            label.appendChild(checkbox);
            label.appendChild(span);
            checkboxesContainer.appendChild(label);
          });
        }
        if (window.APP_CONFIG.PROTESI_PDF) allFilesSet.add(window.APP_CONFIG.PROTESI_PDF);
        if (window.APP_CONFIG.IBAN_PDF) allFilesSet.add(window.APP_CONFIG.IBAN_PDF);
        if (window.APP_CONFIG.ANESTESIA_PDF) allFilesSet.add(window.APP_CONFIG.ANESTESIA_PDF);

        if (window.APP_CONFIG.INTERVENTIONS) {
          const interventions = Object.keys(window.APP_CONFIG.INTERVENTIONS).sort();
          if (interventions.length > 0) {
            interventionGroup.style.display = 'block';
            interventions.forEach(name => {
              // Add to intervention dropdown
              const option = document.createElement('option');
              option.value = window.APP_CONFIG.INTERVENTIONS[name];
              option.textContent = name;
              interventionSelect.appendChild(option);
              
              // Map intervention file for single select
              allFilesSet.add(window.APP_CONFIG.INTERVENTIONS[name]);
            });
          }
        }
        
        // Populate single file dropdown
        const sortedFiles = Array.from(allFilesSet).sort();
        sortedFiles.forEach(filename => {
           const option = document.createElement('option');
           option.value = filename;
           option.textContent = filename;
           singleFileSelect.appendChild(option);
        });
      }

      // Handle UI feedback when a single file is selected
      singleFileSelect.addEventListener('change', (e) => {
        const isSingleFileSelected = e.target.value !== "";
        if (isSingleFileSelected) {
          packageSelectors.style.opacity = '0.3';
          packageSelectors.style.pointerEvents = 'none';
          interventionGroup.style.opacity = '0.3';
          interventionSelect.disabled = true;
          printBtn.innerHTML = `<span class="btn-icon">📄</span> Stampa File Singolo`;
        } else {
          packageSelectors.style.opacity = '1';
          packageSelectors.style.pointerEvents = 'auto';
          interventionGroup.style.opacity = '1';
          interventionSelect.disabled = false;
          printBtn.innerHTML = `<span class="btn-icon">🖨️</span> Genera e Stampa Documenti`;
        }
      });

      function setStatus(msg, type = 'info') {
        statusEl.textContent = msg;
        statusEl.className = '';
        if (type === 'error') statusEl.classList.add('status-error');
        if (type === 'success') statusEl.classList.add('status-success');
      }

      printBtn.addEventListener('click', async () => {
        if (!window.APP_CONFIG || !window.APP_CONFIG.PDF_FILES) {
          setStatus('Errore: config.js mancante o non valido.', 'error');
          progressContainer.classList.add('visible');
          return;
        }

        let files = [];
        
        // Modalità: Singolo File vs Intero Pacchetto
        const singleFileTarget = singleFileSelect.value;
        const isSingleFileMode = singleFileTarget !== "";

        if (isSingleFileMode) {
            files.push(singleFileTarget);
        } else {
            // -- Logica Pacchetto ---
            
            // Recupera file base solo se spuntati dall'utente
            const checkboxes = document.querySelectorAll('.base-doc-checkbox');
            checkboxes.forEach(cb => {
              if (cb.checked) {
                files.push(cb.value);
              }
            });
            
            const isExternalClinic = clinicSelect.value === 'external';

            // 1. Logica Sede Esterna (rimuovere anestesia)
            if (isExternalClinic && window.APP_CONFIG.ANESTESIA_PDF) {
              files = files.filter(f => f !== window.APP_CONFIG.ANESTESIA_PDF);
            }

            // 2. Handle specific interventions logic & Protesi
            const selectedIntervention = interventionSelect.value;
            if (selectedIntervention) {
              files.push(selectedIntervention);

              const selectedText = interventionSelect.options[interventionSelect.selectedIndex].text;
              if (window.APP_CONFIG.BREAST_INTERVENTIONS_REQUIRING_PROTESI &&
                window.APP_CONFIG.BREAST_INTERVENTIONS_REQUIRING_PROTESI.includes(selectedText) &&
                window.APP_CONFIG.PROTESI_PDF) {
                files.push(window.APP_CONFIG.PROTESI_PDF);
              }
            }

            // 3. Logica Sede Esterna (aggiungere IBAN in fondo)
            if (isExternalClinic && window.APP_CONFIG.IBAN_PDF) {
              files.push(window.APP_CONFIG.IBAN_PDF);
            }
        }

        if (files.length === 0) {
          setStatus('Errore: Nessun file configurato nel sistema.', 'error');
          progressContainer.classList.add('visible');
          return;
        }

        const totalFiles = files.length;

        // UI Feedback Start
        printBtn.disabled = true;
        progressContainer.classList.add('visible');
        progressFill.style.width = '0%';
        setStatus(`Connessione in corso... Preparazione di ${totalFiles} documenti.`);

        try {
          const { PDFDocument } = PDFLib;
          const merged = await PDFDocument.create();
          let done = 0;

          // Fetch & Merge
          for (const filename of files) {
            setStatus(`Elaborazione: ${filename}`);

            const url = `${window.APP_CONFIG.SUPABASE_URL}/storage/v1/object/public/${window.APP_CONFIG.BUCKET}/${encodeURIComponent(filename)}`;
            const resp = await fetch(url);

            if (!resp.ok) throw new Error(`Connessione fallita per ${filename} (Codice: ${resp.status})`);

            const bytes = await resp.arrayBuffer();
            const pdf = await PDFDocument.load(bytes);
            
            // Check se il file rientra tra quelli "Fronte/Retro"
            const isDoubleSided = window.APP_CONFIG.DOUBLE_SIDED_FILES && 
                                  window.APP_CONFIG.DOUBLE_SIDED_FILES.includes(filename);

            // Regola 1 (Solo se siamo in modalità Pacchetto): Ogni nuovo documento deve iniziare su fronte.
            if (!isSingleFileMode && merged.getPageCount() % 2 !== 0) {
              merged.addPage([pdf.getPage(0).getWidth(), pdf.getPage(0).getHeight()]);
              console.log(`Aggiunta pagina bianca prima di ${filename} per forzare la stampa sul fronte del nuovo foglio`);
            }

            const pages = await merged.copyPages(pdf, pdf.getPageIndices());
            
            // Regola 2 & 3: Inserimento pagine
            if (isSingleFileMode || isDoubleSided) {
              // Singolo File o Fronte-Retro: Tutte le pagine attaccate (nessuna pagina bianca extra)
              pages.forEach(p => merged.addPage(p));
            } else {
              // Solo Fronte (Modalità Pacchetto): Inseriamo una pagina bianca dopo OGNI pagina reale di questo documento
              const width = pages[0].getWidth();
              const height = pages[0].getHeight();
              
              pages.forEach(p => {
                merged.addPage(p);
                // Aggiungi una pagina vuota per forzare il "retro" bianco del foglio
                merged.addPage([width, height]);
              });
              console.log(`Documento ${filename} elaborato come SOLO FRONTE (aggiunte pagine bianche d'intermezzo)`);
            }

            done++;
            progressFill.style.width = `${Math.round(done / totalFiles * 100)}%`;
          }

          setStatus('Assemblaggio del documento finale...', 'info');
          const mergedBytes = await merged.save();
          const blob = new Blob([mergedBytes], { type: 'application/pdf' });
          const blobUrl = URL.createObjectURL(blob);

          setStatus(`${totalFiles} Documenti pronti. Apertura in corso...`, 'success');

          // Open target
          const newWindow = window.open(blobUrl, '_blank');
          if (newWindow) {
            setTimeout(() => {
              newWindow.print();
            }, 1500);
          } else {
            setStatus('Attenzione: Il browser ha bloccato la finestra a comparsa. Consenti i popup.', 'error');
          }

          setTimeout(() => URL.revokeObjectURL(blobUrl), 1000 * 60 * 5);

        } catch (e) {
          setStatus(`Impossibile procedere: ${e.message}`, 'error');
          console.error(e);
        } finally {
          printBtn.disabled = false;
          // Hide progress slightly after completion unless there was an error
          if (!statusEl.classList.contains('status-error')) {
            setTimeout(() => {
              progressContainer.classList.remove('visible');
            }, 5000);
          }
        }
      });
    });
  </script>
</body>

</html>
